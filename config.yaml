data_file: cpap.csv # CSV file
tag: # optional tag for saved files
save_logs: false # save logs (unless stats are disabled)
stats:
  enabled: true # false to disable all stats and log file
  bucket: false # true to combine adjacent pressures (works best with even number of pressures, can also use pressure_transform)
strip_outliers:
  enabled: true # true to enable outlier detection (modified Z-score)
  threshold: 3.5
  verbose: true
filter:
  max_days: 56 # optional maximum number of days to include (applied after min_date and max_date)
  min_date:  # optional min date in yyyy-mm-dd format
  max_date:  # optional max date in yyyy-mm-dd format
  min_pressure: 7.0 # optional min Pressure
  max_pressure: 7.8 # optional max Pressure
  max_leak_rate: 2.0 # optional max AvgLR
  min_usage: 6.0 # optional min Usage (hrs)
  min_sleep: 5.5 # optional min Sleep (hrs)
  min_sleep_efficiency: 0.75  # optional min ratio between Sleep and Usage
  collar: 0 # optional collar value (0 for no collar, 1 for collar, or null for both)
  verbose: false # print details for configuration-based filtering
pressure_transform: # use to combine pressure with another pressure (applied before filters)
pressure_counts:
  enabled: true # true to show a breakdown of dates for each pressure
  max_dates: 6 # optional maximum number of dates displayed for each pressure
  pressure_date_correlation: true # true to display pressure/date correlation
next_pressure:
  enabled: true # true to enable recommending next pressure (choose lowest adjusted pressure count)
  last_pressure_boost: 3 # optional boost for last pressure (positive number reduces adjusted count)
  random_sigma: 0.5 # optional sigma used to randomly adjust counts (low value for tie-breaker, larger value for more randomization)
  pressure_boosts: # dictionary of pressure boosts (positive number reduces adjusted count)
  center_weight: 1 # optional multiplier applied to distance from pressure that will center mean
  verbose: true
all_correlations:
  enabled: false # true to run correlations between all enabled fields
  num_correlations: # optional number of correlations to display between all fields (null to display all)
  min_correlation: 0.4 # optional minimum correlation to display (default 0)
correlation:
  enabled: false # true to enable linear regression (including correlation and plotting)
  num_correlations:  # optional number of correlations to display for field in x_fields (null to display all)
  min_correlation: 0.2 # optional minimum correlation to display (default 0)
r2:
  linear: true # true to display linear R² scores
  quadratic: true # true to display quadratic R² scores
  adjusted: true # true to use adjusted R²
  num_scores:  # optional number of R² scores to display for field in x_fields (null to display all)
  min_score: 0.1 # optional minimum correlation to display (default 0)
plot:
  enabled: true # true to enable plotting when enabled for both x and y fields
  violin: false # true for violin plot
  box: true # true for box plot
  linear: false # true to plot scatter plot and linear regression
  quadratic: false # include plot scatter plot and quadratic regression (combined with linear if both are true)
  min_r2: 0.1 # optional min R² score (either linear or quadratic) to display graphs
  save: false # save plots
elastic_net:
  enabled: false # true to enable ElasticNet regression using multi_x_field
  alpha: 1.0 # alpha for ElasticNet regression
  l1_ratio: 1.0 # l1_ratio for ElasticNet regression
  seed: 42 # random seed
bayesian_ridge:
  enabled: false # perform BayesianRidge regression using multi_x_field
  min_weight: 0.2 # optional minimum BayesianRidge weight to print (default 0)
ard:
  enabled: false # perform ARD Bayesian regression using multi_x_field
  min_weight: 0.2 # optional minimum ARD weight to print (default 0)
linear_partial_dependence:
  enabled: false
  save: false
# fields
# - key: key in CSV
# - name: optional display name (defaults to key)
# - title: optional title for plotting (defaults to name)
# - plot: true to enable linear/quadratic plotting (must be true for both fields and globally enabled)
# - y_field: true if used as a y field (will also be used for regularization unless multi_x_field is true)
# - x_field: true if used as an x field for correlation and linear regression
# - multi_x_field: true if used as an x field for regularization (e.g. ElasticNet)
fields:
  - key: Comb FL
    name: Combined FL # % of breath
    y_field: false # excellent, no need to track
    # Combined FL Percentage - https://airwaylab.app/glossary/combined-fl-percentage
    # The percentage of breaths classified as flow-limited by either NED (above 34%) or Flatness Index (above 0.85).
    # Combines both detection methods for a more complete picture.
    # Good < 20%, Borderline 20-40%, Elevated > 40%
  - key: FLS
    name: Flow Limitation Score
    y_field: true
    plot: true
    # Flow Limitation Score - https://airwaylab.app/glossary/fl-score
    # A population-level metric measuring how much tidal volume variance is concentrated at flow peaks,
    # indicating flat-topped (flow-limited) breathing. Reported as a percentage.
    # Good < 30%, Borderline 30-50%, Elevated > 50%
  - key: GI
    name: Glasgow Index
    y_field: true
    plot: true
    # Glasgow Index - https://airwaylab.app/glossary/glasgow-index
    # A composite breath-shape scoring system that evaluates 9 flow limitation characteristics per breath on a 0-9 scale.
    # Lower scores indicate better therapy.
    # Good < 1.0, Borderline 1.0-2.0, Elevated > 2.0
  - key: GI Sk
    name: GI Skew
    y_field: false # excellent, no need to track
    # Glasgow Index - Skew
    # Measures the asymmetry of the inspiratory flow curve. A normal breath rises and falls symmetrically.
    # Flow-limited breaths often peak early and trail off — high skew indicates the airway is narrowing during inspiration.
  - key: GI Sp
    name: GI Spike
    y_field: false # excellent, no need to track
    # Glasgow Index - Spike
    # Detects sharp transient peaks at the beginning of inspiration. A brief spike followed by reduced flow shows a
    # pattern where the waveform briefly opens then narrows.
  - key: GI FT
    name: GI Flat Top
    y_field: false # excellent, no need to track
    # Glasgow Index - Flat Top
    # Identifies inspiratory flow plateaus where flow reaches a ceiling and cannot increase despite continued
    # inspiratory effort. This is the classic "flow limitation" pattern seen in clinical polysomnography.
  - key: GI TH
    name: GI Top Heavy
    y_field: true
    # Glasgow Index - Top Heavy
    # Quantifies how much of the breath's tidal volume is delivered in the first half of inspiration versus the second
    # half. Top-heavy breaths indicate early flow limitation onset. (Computed but excluded from overall score.)
  - key: GI MP
    name: GI Multi Peak
    y_field: false # excellent, no need to track
    # Glasgow Index - Multi Peak
    # Detects oscillatory flow patterns with multiple peaks during a single inspiration.
    # Multi-peak patterns show oscillation in the flow waveform, often seen with moderate flow limitation.
  - key: GI NP
    name: GI No Pause
    y_field: true
    # Glasgow Index - No Pause
    # Assesses whether there is an adequate pause between expiration and the next inspiration.
    # Absent pauses are associated with higher respiratory rate, often a compensatory response to flow limitation.
  - key: GI IR
    name: GI Inspiration Rate
    y_field: false # excellent, no need to track
    # Glasgow Index - Inspiration Rate
    # Evaluates the peak inspiratory flow rate relative to the breath population.
    # Abnormally high rates may reflect higher respiratory rate.
  - key: GI MB
    name: GI Multi Breath
    y_field: false # excellent, no need to track
    # Glasgow Index - Multi-Breath
    # Detects sequences of breaths with progressively worsening flow limitation characteristics,
    # showing a crescendo pattern in the waveform.
  - key: GI VA
    name: GI Var Amp
    y_field: true
    # Glasgow Index - Variable Amplitude
    # Measures breath-to-breath variability in tidal volume. High variability indicates unstable ventilation,
    # which can accompany cycling between obstruction and recovery.
  - key: NED Mean
    y_field: false # excellent, no need to track
    # NED Mean (Negative Effort Dependence) - https://airwaylab.app/glossary/ned-mean
    # A per-breath measure of flow limitation calculated as the ratio of peak inspiratory flow to mid-inspiratory flow.
    # Higher values indicate more airway narrowing during inhalation.
    # Good < 15%, Borderline 15-25%, Elevated > 25%
  - key: H1 NED Mean
    y_field: false
  - key: H2 NED Mean
    y_field: false
  - key: NED Mean Split # calculated: abs(H2 NED Mean - H1 NED Mean)
    y_field: false
  - key: NED RDI
    y_field: true
    plot: true
    # RDI (Respiratory Disturbance Index) - https://airwaylab.app/glossary/rdi
    # The total number of respiratory events per hour, including apneas, hypopneas, and RERAs.
    # A more comprehensive measure than AHI alone.
    # AirwayLab estimates RDI by combining detected RERAs (NED engine) with detected hypopneas (flow amplitude drops
    # sustained for 10+ seconds). Apneas cannot be reliably detected from flow data alone, so this estimate is a
    # conservative lower bound. It is most accurate when apneas are rare, as is typical in UARS.
    # Good < 5/h4, Borderline 5-15/hr, Elevated >15/hr
  - key: BOI
    name: Brief Obstruction Index
    y_field: true
    plot: true
  - key: AHI
    y_field: true
    # AHI (Apnea-Hypopnea Index) - https://airwaylab.app/glossary/ahi
    # The number of apneas and hypopneas per hour of sleep. The most widely used measure of sleep apnea severity,
    # but it misses flow limitation and RERAs.
  - key: RDI # calculated: AHI + RERA
    y_field: true
    # RERA (Respiratory Effort-Related Arousal) - https://airwaylab.app/glossary/rera
    # A sequence of flow-limited breaths that terminates in a cortical arousal without meeting criteria for apnea or
    # hypopnea. A hallmark of Upper Airway Resistance Syndrome.
    # Good < 5/hr, Borderline 5-10/h4, Elevated > 10/hr
  - key: CAI
    y_field: true
    plot: true
    # Central Apnea Index (AS11)
  - key: 95%FL
    name: 95% Flow Limitation
    y_field: true
    # 95%ile Flow Limitation (AS11)
  - key: AvgLR
    name: Average Leak Rate
    x_field: false
    y_field: true
    multi_x_field: true
    plot: true
    # Average leak rage (AS11)
  - key: FI Mean
    name: Flatness Index Mean
    y_field: true
    # Flatness Index Mean - https://airwaylab.app/glossary/flatness-index
    # The ratio of mean inspiratory flow to peak inspiratory flow per breath. Values of 0.85 or above indicate
    # significant flow limitation with a flat-topped breath pattern.
    # Normal < 0.75, Borderline 0.75-0.85, Flow-Limited > 0.85
  - key: IFL
    title: IFL Symptom Risk %
    y_field: true
    plot: true
    # Flow Limitation (Inspiratory Flow Limitation) - https://airwaylab.app/glossary/flow-limitation
    # Partial narrowing of the upper airway during inspiration that restricts airflow without complete collapse.
    # The core phenomenon that AirwayLab analyses.
  - key: Period
    name: Periodicity
    y_field: true
    plot: true
    # Periodicity Index - https://airwaylab.app/glossary/periodicity-index
    # Detects cyclical breathing patterns with 30-100 second cycles using FFT spectral analysis.
    # Elevated values suggest periodic breathing or Cheyne-Stokes respiration.
    # Normal < 20, Borderline 20-40, Elevated > 40
  - key: Regul
    name: Regularity
    y_field: true
    plot: true
    # Sample Entropy (Regularity Score) - https://airwaylab.app/glossary/sample-entropy
    # Good < 30, Borderline 30-50, Overly Regular > 50
  - key: Timestamp # numeric Date
    name: Date
    x_field: false
    multi_x_field: true
  - key: Pressure
    plot: true
    x_field: true
    multi_x_field: true
  - key: Collar
    plot: false
    x_field: false # TODO experiment with collar (disable other x fields)
    multi_x_field: false # TODO experiment with collar




filename: cpap.csv # CSV file
seed: 42 # random seed (used for ElasticNet)
print_filter_details: false # print details for configuration-based filtering
min_date:  # optional min date in yyyy-mm-dd format
max_date:  # optional max date in yyyy-mm-dd format
max_days: 56 # optional maximum number of days to include (8 weeks, applied after min_date and max_date)
min_pressure: 7.0 # optional min Pressure
max_pressure: 7.8 # optional max Pressure
max_leak_rate: 1.6 # optional max AvgLR
min_usage: 6.0 # optional min Usage (hrs)
min_sleep: 5.5 # optional min Sleep (hrs)
min_sleep_efficiency: 0.75 # optional min ratio between Sleep and Usage
num_correlations: 5 # optional num correlations to display
elastic_net: false # true to enable ElasticNet regression
alpha: 0.2 # alpha for ElasticNet regression
l1_ratio: 1.0 # l1_ratio for ElasticNet regression
bayesian: false # perform BayesianRidge regression
min_bayesian_weight: 0.1 # optional minimum BayesianRidge weight to print
ard: true # perform ARD Bayesian regression
min_ard_weight: 0.1 # optional minimum ARD weight to print
linear: true # true to enable linear regression (including correlation and plotting)
plot: false # true to enable plotting
plot_quadratic: false # include quadratic regression in plots
save_plots: false # save plots
save_logs: true # save logs
weight_frequency: false # true to weight by inverse frequency for pressure
weight_usage: false # true to weight by usage
target_pressure_weight: 1.0 # weight for distance from pressure to center mean when calculating next pressure (1 pressure = 1 count if 1.0)
last_pressure_boost: 2.0 # boost for last pressure when calculating next pressure (reduces pressure count)
next_pressure_random: 2.0 # random weight when selecting next pressure
x_field: Pressure # X field for linear regression and plots
y_fields: # fields to calculate with optional title for plots and plot flag to allow plotting if globally enabled
  - name: Comb FL
    title: Combined FL (WAT/NED)
    plot: true
  - name: FLS
    title: Flow Limitation Score (WAT)
    plot: true
  - name: GI
    title: Glasgow Index
    plot: true
  - name: NED RDI
    title: Est. RDI (NED)
    plot: true
  - name: BOI
    title: Brief Obstruction Index
    plot: true
  - name: Usage
    title: Usage (AS11)
    enabled: false
  - name: AHI
    title: AHI (AS11)
  - name: CAI
    title: CAI (AS11)
  - name: RDI
    title: RDI (AS11)
  - name: 95%FL
    title: 95% Flow Limitation (AS11)
  - name: AvgLR
    title: Average Leak Rate (AS11)
  - name: IFL
    title: IFL Symptom Risk % (WAT/NED/GI)
  - name: NED Mean
    title: NED Mean (NED)
  - name: NED RERA
    title: RERA/hr (NED)
  - name: Period
    title: Periodicity (WAT)
  - name: Regul
    title: Regularity (WAT)
multi_x_fields: # X fields for regularization
  - Pressure
  - AvgLR
  - Usage
  - Sleep
  - REM
  - Deep
  - Timestamp
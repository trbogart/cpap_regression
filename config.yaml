filename: cpap.csv # CSV file
seed: 42
min_pressure: 7 # min pressure
max_pressure: 8 # max pressure
max_leak_rate: 1.5 # max AvgLR
min_usage: 6 # min usage (hrs)
min_sleep: 5.5 # min sleep (hrs)
min_sleep_efficiency: 0.75 # min ratio between sleep and usage
num_correlations: 10 # num correlations to display
alpha: 0.02 # alpha for ElasticNet regression
l1_ratio: 1 # l1_ratio for ElasticNet regression
plot: true # true to enable plotting
plot_quadratic: false # include quadratic regression in plots
save_plots: false # save plots to {column}.png
weighted: false # true to use Inverse Probability Weightingt
y_fields: # fields to calculate with optional title for ploting and plot flag to allow plotting if globally enabled
  - name: Comb FL
    title: Combined FL (WAT/NED)
    plot: true
  - name: FLS
    title: Flow Limitation Score (WAT)
    plot: true
  - name: GI
    title: Glasgow Index
    plot: true
  - name: NED RDI
    title: Est. RDI (NED)
    plot: true
  - name: BOI
    title: Brief Obstruction Index
    plot: true
  - name: Usage
    title: Usage (AS11)
    enabled: false
  - name: AHI
    title: AHI (AS11)
  - name: CAI
    title: CAI (AS11)
    plot: true
  - name: RDI
    title: RDI (AS11)
  - name: 95%FL
    title: 95% Flow Limitation (AS11)
  - name: AvgLR
    title: Average Leak Rate (AS11)
  - name: IFL
    title: IFL Symptom Risk % (WAT/NED/GI)
  - name: NED Mean
    title: NED Mean (NED)
  - name: NED RERA
    title: RERA/hr (NED)
  - name: Period
    title: Periodicity (WAT)
  - name: Regul
    title: Regularity (WAT)

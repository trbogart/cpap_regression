data_file: cpap.csv # CSV file
stats:
  enabled: true # false to disable all stats and log file
  save_logs: false # save logs (unless stats are disabled)
  bucket: false # true to bucket adjacent pressures (works best with an odd number of pressures)
filter:
  max_days: 56 # optional maximum number of days to include (applied after min_date and max_date)
  min_date:  # optional min date in yyyy-mm-dd format
  max_date:  # optional max date in yyyy-mm-dd format
  min_pressure: 7.4 # optional min Pressure
  max_pressure:  # optional max Pressure
  max_leak_rate: 2.0 # optional max AvgLR
  min_usage: 6.0 # optional min Usage (hrs)
  min_sleep: 5.5 # optional min Sleep (hrs)
  min_sleep_efficiency: 0.75 # optional min ratio between Sleep and Usage
  verbose: false # print details for configuration-based filtering
next_pressure:
  enabled: true # true to enable recommending next pressure (choose lowest adjusted pressure count)
  last_pressure_boost: 3 # optional boost for last pressure (positive number reduces adjusted count)
  random_sigma: 1.2 # optional sigma used to randomly adjust counts
  excluded_pressures: [] # list of pressures that are never recommended
  pressure_boosts: # dictionary of pressure boosts (positive number reduces adjusted count)
    # TODO temporarily fill in every other bucket first
    7.4: 3
    7.8: 3
    8.2: 3
    8.6: 3
    9.0: 3
  center_weight: 5 # multiplier applied to distance from pressure that will center mean
  verbose: true
weighted_by:
  frequency: false # true to weight by inverse frequency for pressure
  usage: false # true to weight by usage
all_correlations:
  enabled: false # true to run correlations between all enabled fields
  num_correlations: # optional number of correlations to display between all fields (null to display all)
  min_correlation: 0.5 # optional minimum correlation to display (default 0)
linear:
  enabled: true # true to enable linear regression (including correlation and plotting)
  num_correlations:  # optional number of correlations to display for field in x_fields (null to display all)
  min_correlation: 0.2 # optional minimum correlation to display (default 0)
  plot: false # true to enable plotting when enabled for both x and y fields
  plot_quadratic: false # include quadratic regression in plots
  save_plots: false # save plots
elastic_net:
  enabled: true # true to enable ElasticNet regression using multi_x_field
  alpha: 1.0 # alpha for ElasticNet regression
  l1_ratio: 1.0 # l1_ratio for ElasticNet regression
  seed: 42 # random seed
bayesian:
  enabled: false # perform BayesianRidge regression using multi_x_field
  min_weight: 0.2 # optional minimum BayesianRidge weight to print
ard:
  enabled: false # perform ARD Bayesian regression using multi_x_field
  min_weight: 0.2 # optional minimum ARD weight to print
# fields
# - key: key in CSV
# - name: optional display name (defaults to key)
# - title: optional title for plotting (defaults to name)
# - plot: true to enable linear/quadratic plotting (must be true for both fields and globally enabled)
# - y_field: true if used as a y field (will also be used for regularization unless multi_x_field is true)
# - x_field: true if used as an x field for correlation and linear regression
# - multi_x_field: true if used as an x field for regularization (e.g. ElasticNet)
fields:
  - key: Comb FL
    name: Combined FL
    y_field: true
  - key: FLS
    name: Flow Limitation Score
    y_field: true
  - key: GI
    name: Glasgow Index
    y_field: true
    plot: true
  - key: GI Sk
    name: GI Skew
    y_field: true
  - key: GI Sp
    name: GI Spike
    y_field: true
  - key: GI FT
    name: GI Flat Top
    y_field: true
  - key: GI TH
    name: GI Top Heavy
    y_field: true
  - key: GI MP
    name: GI Multi Peak
    y_field: true
  - key: GI NP
    name: GI No Pause
    y_field: true
  - key: GI IR
    name: GI Inspiration Rate
    y_field: true
  - key: GI MB
    name: GI Multi Breath
    y_field: true
  - key: GI VA
    name: GI Var Amp
    y_field: true
  - key: NED Mean
    y_field: true
  - key: H1 NED Mean
    y_field: true
  - key: H2 NED Mean
    y_field: true
  - key: NED Mean Split # calculated: abs(H2 NED Mean - H1 NED Mean)
    y_field: true
  - key: NED RDI
    y_field: true
    plot: true
  - key: BOI
    name: Brief Obstruction Index
    y_field: true
  - key: AHI
    y_field: true
  - key: RERA
    y_field: true
  - key: RDI # calculated: AHI + RERA
    y_field: true
  - key: CAI
    y_field: true
    plot: true
  - key: 95%FL
    name: 95% Flow Limitation
    y_field: true
  - key: AvgLR
    name: Average Leak Rate
    y_field: true
    multi_x_field: true
  - key: IFL
    title: IFL Symptom Risk %
    y_field: true
  - key: Period
    name: Periodicity
    y_field: true
  - key: Regul
    name: Regularity
    y_field: true
  - key: Pressure
    x_field: true # primary x field
    plot: true
    multi_x_field: true
  - key: Usage
    multi_x_field: true
  - key: Sleep
    multi_x_field: true
  - key: REM
    multi_x_field: true
  - key: Deep
    multi_x_field: true
  - key: Timestamp # numeric Date
    name: Date
    x_field: true
    multi_x_field: true
  - key: Efficiency # Calculated: Usage / Sleep
    name: Sleep Efficiency



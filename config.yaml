# TODO after balanced, enable save_logs and stats and disable next_pressure.verbose
# TODO increase max_days to 91 after balanced? (each stage will take ~4-5 weeks)
data_file: cpap.csv # CSV file
save_logs: false # save logs
filter:
  max_days: 56 # optional maximum number of days to include (applied after min_date and max_date)
  min_date:  # optional min date in yyyy-mm-dd format
  max_date:  # optional max date in yyyy-mm-dd format
  min_pressure:  # optional min Pressure
  max_pressure:  # optional max Pressure
  max_leak_rate: 2.0 # optional max AvgLR
  min_usage: 6.0 # optional min Usage (hrs)
  min_sleep: 5.5 # optional min Sleep (hrs)
  min_sleep_efficiency: 0.75 # optional min ratio between Sleep and Usage
  verbose: false # print details for configuration-based filtering
next_pressure:
  enabled: true # true to enable recommending next pressure (choose lowest adjusted pressure count)
  last_pressure_boost: 3.0 # optional boost for last pressure (reduces adjusts count)
  random_sigma: 1.25 # optional sigma used to randomly adjust counts
  corr_weight: 5.0 # optional correlation weight, adjust counts by pressure * corr_weight if set (5 to scale pressure)
  verbose: true
weighted_by:
  frequency: false # true to weight by inverse frequency for pressure
  usage: false # true to weight by usage
all_correlations:
  enabled: false # true to run correlations between all enabled fields
  num_correlations: # optional number of correlations to display between all fields (null to display all)
  min_correlation: 0.5 # optional minimum correlation to display (default 0)
linear:
  enabled: false # true to enable linear regression (including correlation and plotting)
  num_correlations:  # optional number of correlations to display for field in x_fields (null to display all)
  min_correlation: 0.1 # optional minimum correlation to display (default 0)
  plot: true # true to enable plotting when enabled for both x and y fields
  plot_quadratic: true # include quadratic regression in plots
  save_plots: true # save plots
elastic_net:
  enabled: false # true to enable ElasticNet regression using multi_x_field
  alpha: 0.2 # alpha for ElasticNet regression
  l1_ratio: 1.0 # l1_ratio for ElasticNet regression
  seed: 42 # random seed
bayesian:
  enabled: false # perform BayesianRidge regression using multi_x_field
  min_weight: 0.1 # optional minimum BayesianRidge weight to print
ard:
  enabled: false # perform ARD Bayesian regression using multi_x_field
  min_weight: 0.1 # optional minimum ARD weight to print
# fields
# - key: key in CSV
# - name: optional display name (defaults to key)
# - title: optional title for plotting (defaults to name)
# - plot: true to enable linear/quadratic plotting (must be true for both fields and globally enabled)
# - y_field: true if used as a y field (will also be used for regularization unless multi_x_field is true)
# - x_field: true if used as an x field for correlation and linear regression
# - multi_x_field: true if used as an x field for regularization (e.g. ElasticNet)
fields:
  - key: Comb FL
    name: Combined FL
    y_field: false # disable - strongly correlated with other metrics
  - key: FLS
    name: Flow Limitation Score
    y_field: false # disable - strongly correlated with other metrics
  - key: GI
    name: Glasgow Index Overall
    plot: true
    y_field: true
  - key: GI Sk
    name: Glasgow Index Skew
    y_field: true
  - key: GI TH
    name: Glasgow Index Top Heavy
    y_field: true
  - key: GI VA
    name: Glasgow Index Var Amp
    y_field: true
  - key: NED RDI
    plot: true
    y_field: true
  - key: BOI
    name: Brief Obstruction Index
    plot: true
    y_field: true
  - key: AHI
    y_field: false # disable
  - key: RERA
    y_field: false # disable
  - key: RDI
    y_field: true # disable
  - key: CAI
    y_field: true
  - key: 95%FL
    name: 95% Flow Limitation
    y_field: true
  - key: AvgLR
    name: Average Leak Rate
    y_field: true
    multi_x_field: true
  - key: IFL
    title: IFL Symptom Risk %
    y_field: false # disable
  - key: Period
    name: Periodicity
    y_field: true
  - key: Regul
    name: Regularity
    y_field: true
  - key: Pressure
    x_field: true # primary x field
    plot: true
    multi_x_field: true
  - key: Usage
    multi_x_field: true
  - key: Sleep
    multi_x_field: true
  - key: REM
    multi_x_field: true
  - key: Deep
    multi_x_field: true
  - key: Timestamp
    name: Date
    multi_x_field: true
  - key: Efficiency
    name: Sleep Efficiency
    multi_x_field: false # disabled


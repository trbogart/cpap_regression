filename: cpap.csv # CSV file
seed: 42 # random seed (used for ElasticNet)
print_filter_details: false # print details for configuration-based filtering
min_pressure:  # optional min Pressure (defaults to dataset min)
max_pressure:  # optional max Pressure (defaults to dataset max)
max_days: 56 # optional maximum number of days to include (applied after min_date and max_date)
min_date: 2026-04-20 # optional min date in yyyy-mm-dd format
max_date:  # optional max date in yyyy-mm-dd format
max_leak_rate: 1.6 # optional max AvgLR
min_usage: 6.0 # optional min Usage (hrs)
min_sleep: 5.5 # optional min Sleep (hrs)
min_sleep_efficiency: 0.75 # optional min ratio between Sleep and Usage
num_correlations: 10 # optional number of correlations to display for field in x_fields (null to display all)
num_all_correlations: 20 # optional number of correlations to display between all fields
elastic_net: false # true to enable ElasticNet regression
alpha: 0.2 # alpha for ElasticNet regression
l1_ratio: 1.0 # l1_ratio for ElasticNet regression
bayesian: false # perform BayesianRidge regression
min_bayesian_weight: 0.1 # optional minimum BayesianRidge weight to print
ard: true # perform ARD Bayesian regression
min_ard_weight: 0.1 # optional minimum ARD weight to print
linear: true # true to enable linear regression (including correlation and plotting)
plot: false # true to enable plotting linear (and quadratic if plot_quadratic) regressions
plot_quadratic: false # include quadratic regression in plots
save_plots: false # save plots
save_logs: true # save logs
weight_frequency: false # true to weight by inverse frequency for pressure
weight_usage: false # true to weight by usage
target_pressure_weight: 1.0 # weight for distance from pressure to center mean when calculating next pressure (1 pressure = 1 count if 1.0)
last_pressure_boost: 2.0 # boost for last pressure when calculating next pressure (reduces pressure count)
next_pressure_random: 2.0 # random weight when selecting next pressure
# y_fields
# - key: key in CSV
# - name: optional display name (defaults to key)
# - title: optional title for plotting (defaults to name)
# - plot: true to allow linear/quadratic plotting if true for both fields and globally enabled
# - ignored: true ti ignore this field
y_fields:
  - key: Comb FL
    name: Combined FL
    plot: false
    ignored: true # strongly correlated with other metrics
  - key: FLS
    name: Flow Limitation Score
    plot: false
    ignored: true # strongly correlated with other metrics
  - key: GI
    name: Glasgow Index
    plot: true
  - key: NED RDI
    plot: true
  - key: BOI
    name: Brief Obstruction Index
    plot: true
  - key: Usage
  - key: AHI
    ignored: true # strongly correlated with RDI
  - key: CAI
  - key: RDI
  - key: 95%FL
    name: 95% Flow Limitation
  - key: AvgLR
    name: Average Leak Rate
  - key: IFL
    title: IFL Symptom Risk %
    ignored: true # strongly correlated with other metrics
  - key: NED Mean
    ignored: true # strongly correlated with other metrics
  - key: NED RERA
    name: RERA/hr
    ignored: true # strongly correlated with other metrics
  - key: Period
    name: Periodicity
  - key: Regul
    name: Regularity
x_fields: # X fields for linear regression and plots (see y_fields)
  - key: Pressure
    plot: true
  - key: AvgLR
    name: Average Leak Rate
    ignored: true
  - key: Usage
    ignored: true
  - key: Sleep
    ignored: true
  - key: REM
    name: REM Sleep
    ignored: true
  - key: Deep
    name: Deep Sleep
    ignored: true
  - key: Timestamp
    name: Date
    ignored: true
multi_x_fields: # X fields for regularization (see y_fields, but only uses key, name, and enabled)
  - key: Pressure
  - key: AvgLR
    name: Average Leak Rate
  - key: Usage
  - key: Sleep
  - key: REM
    name: REM Sleep
  - key: Deep
    name: Deep Sleep
  - key: Timestamp


data_file: cpap.csv # CSV file
save_logs: true # save logs
filter:
  max_days: 56 # optional maximum number of days to include (applied after min_date and max_date)
  min_date: 2026-04-20 # optional min date in yyyy-mm-dd format
  max_date:  # optional max date in yyyy-mm-dd format
  min_pressure:  # optional min Pressure (defaults to dataset min)
  max_pressure:  # optional max Pressure (defaults to dataset max)
  max_leak_rate: 1.6 # optional max AvgLR
  min_usage: 6.0 # optional min Usage (hrs)
  min_sleep: 5.5 # optional min Sleep (hrs)
  min_sleep_efficiency: 0.75 # optional min ratio between Sleep and Usage
  verbose: false # print details for configuration-based filtering
all_correlations:
  enabled: true
  num_correlations: # optional number of correlations to display between all fields
  min_correlation: 0.3 # minimum correlation size
linear:
  enabled: true # true to enable linear regression (including correlation and plotting)
  num_correlations:  # optional number of correlations to display for field in x_fields (null to display all)
  min_correlation: 0.1 # min correlation to display (default 0)
  plot: false # true to enable plotting linear (and quadratic if plot_quadratic) regressions if enabled for both fields
  plot_quadratic: false # include quadratic regression in plots
  save_plots: false # save plots
elastic_net:
  enabled: false # true to enable ElasticNet regression using fields with multi_x_field
  alpha: 0.2 # alpha for ElasticNet regression
  l1_ratio: 1.0 # l1_ratio for ElasticNet regression
  seed: 42
bayesian:
  enabled: false # perform BayesianRidge regression using fields with multi_x_field
  min_weight: 0.1 # optional minimum BayesianRidge weight to print
ard:
  enabled: true # perform ARD Bayesian regression using fields with multi_x_field
  min_weight: 0.1 # optional minimum ARD weight to print
weighted:
  frequency: false # true to weight by inverse frequency for pressure
  usage: false # true to weight by usage
next_pressure:
  enabled: true
  target_pressure_weight: 1.0 # weight for distance from pressure to center mean when calculating next pressure (1 pressure = 1 count if 1.0)
  last_pressure_boost: 2.0 # boost for last pressure when calculating next pressure (reduces pressure count)
  random_weight: 2.0 # random weight when selecting next pressure
# y_fields
# - key: key in CSV
# - name: optional display name (defaults to key)
# - title: optional title for plotting (defaults to name)
# - plot: true to allow linear/quadratic plotting if true for both fields and globally enabled
# - y_field: true if used as y field (will also be used for regularization unless multi_x_field is true)
# - x_field: true if used as x field for correlation and linear regression
# - multi_x_field: true if used as x field for regularization
fields:
  - key: Comb FL
    name: Combined FL
    plot: false
    y_field: false # strongly correlated with other metrics
  - key: FLS
    name: Flow Limitation Score
    plot: false
    y_field: false # strongly correlated with other metrics
  - key: GI
    name: Glasgow Index
    plot: true
    y_field: true
  - key: NED RDI
    plot: true
    y_field: true
  - key: BOI
    name: Brief Obstruction Index
    plot: true
    y_field: true
  - key: Usage
  - key: AHI
    y_field: false # strongly correlated with RDI
  - key: CAI
    y_field: true
  - key: RDI
    y_field: true
  - key: 95%FL
    name: 95% Flow Limitation
  - key: AvgLR
    name: Average Leak Rate
    y_field: true
    multi_x_field: true
  - key: IFL
    title: IFL Symptom Risk %
    y_field: false # strongly correlated with other metrics
  - key: NED Mean
    y_field: false # strongly correlated with other metrics
  - key: NED RERA
    name: RERA/hr
    y_field: false # strongly correlated with other metrics
  - key: Period
    name: Periodicity
    y_field: true
  - key: Regul
    name: Regularity
    y_field: true
  - key: Pressure
    plot: true
    x_field: true # primary x field
    multi_x_field: true
  - key: Usage
    multi_x_field: true
  - key: Sleep
    multi_x_field: true
  - key: REM
    name: REM Sleep
    multi_x_field: true
  - key: Deep
    name: Deep Sleep
    multi_x_field: true
  - key: Timestamp
    name: Date
    multi_x_field: true

